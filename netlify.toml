[build]
  command = "npm run build"
  node_version = "20"

# Next.js runtime; Netlify Forms need public/__forms.html + client POST (see components/netlify-form.tsx)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Basic security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
# Route /admin to Decap entrypoint without redirect loops in netlify dev
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Legacy paths (newsroom → news); mirrors next.config.js redirects
[[redirects]]
  from = "/newsroom"
  to = "/news"
  status = 301

[[redirects]]
  from = "/newsroom/*"
  to = "/news/:splat"
  status = 301

