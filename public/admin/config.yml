backend:
  name: github
  repo: whittenluke/ruralhallalliance
  branch: main
  site_domain: ruralhallalliance.netlify.app

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "settings"
    label: "Site Settings"
    delete: false
    editor:
      preview: false
    files:
      - file: "content/settings/site-settings.md"
        label: "Site Settings"
        name: "site_settings"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Site Tagline", name: "site_tagline", widget: "string", required: false }
          - {
              label: "General Email",
              name: "general_email",
              widget: "string",
              pattern: ['^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$', "Enter a valid email address."]
            }
          - {
              label: "Media Email",
              name: "media_email",
              widget: "string",
              pattern: ['^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$', "Enter a valid email address."]
            }
          - { label: "Footer Text", name: "footer_text", widget: "text", required: false }

  - name: "pages"
    label: "Pages"
    files:
      - file: "content/pages/home.md"
        label: "Home"
        name: "home"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Summary", name: "hero_summary", widget: "text" }
          - { label: "Primary CTA Label", name: "hero_primary_cta_label", widget: "string" }
          - {
              label: "Primary CTA Link",
              name: "hero_primary_cta_link",
              widget: "string",
              hint: "Use an internal path like /news or a full URL like https://example.org",
              pattern: ['^(\\/[^\\s]*)|(https?:\\/\\/[^\\s]+)$', "Use /path or a full http(s) URL."]
            }
          - { label: "Secondary CTA Label", name: "hero_secondary_cta_label", widget: "string", required: false }
          - {
              label: "Secondary CTA Link",
              name: "hero_secondary_cta_link",
              widget: "string",
              required: false,
              hint: "Use an internal path like /calendar or a full URL like https://example.org",
              pattern: ['^(\\/[^\\s]*)|(https?:\\/\\/[^\\s]+)$', "Use /path or a full http(s) URL."]
            }
          - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
          - { label: "Intro Heading", name: "intro_heading", widget: "string", required: false }
          - { label: "Intro Body", name: "intro_body", widget: "markdown", required: false }
      - file: "content/pages/about.md"
        label: "About"
        name: "about"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Summary", name: "summary", widget: "text", required: false }
          - { label: "Mission Heading", name: "mission_heading", widget: "string", required: false }
          - { label: "Mission Body", name: "mission_body", widget: "markdown", required: false }
          - { label: "Who We Serve Heading", name: "who_we_serve_heading", widget: "string", required: false }
          - { label: "Who We Serve Body", name: "who_we_serve_body", widget: "markdown", required: false }
          - { label: "Body", name: "body", widget: "markdown", required: false }
      - file: "content/pages/governance.md"
        label: "Governance"
        name: "governance"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Summary", name: "summary", widget: "text", required: false }
          - {
              label: "Body",
              name: "body",
              widget: "markdown",
              required: false,
              hint: "Main page copy — e.g. Board of Directors overview, roles, and how to reach the board."
            }
      - file: "content/pages/media.md"
        label: "Media"
        name: "media"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Summary", name: "summary", widget: "text", required: false }
          - {
              label: "Media Email",
              name: "media_email",
              widget: "string",
              required: false,
              pattern: ['^$|^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$', "Leave blank or enter a valid email address."]
            }
      - file: "content/pages/membership.md"
        label: "Membership"
        name: "membership"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Summary", name: "summary", widget: "text", required: false }
      - file: "content/pages/contact.md"
        label: "Contact"
        name: "contact"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Summary", name: "summary", widget: "text", required: false }
          - {
              label: "General Email",
              name: "general_email",
              widget: "string",
              required: false,
              pattern: ['^$|^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$', "Leave blank or enter a valid email address."]
            }
      - file: "content/pages/calendar-page.md"
        label: "Calendar Page"
        name: "calendar_page"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Summary", name: "summary", widget: "text", required: false }
      - file: "content/pages/news-page.md"
        label: "News Page"
        name: "news_page"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Summary", name: "summary", widget: "text", required: false }

  - name: "news"
    label: "News"
    label_singular: "News Article"
    folder: "content/news"
    extension: "md"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Slug",
          name: "slug",
          widget: "string",
          hint: "URL segment only (lowercase + hyphens). Filename is built from date + slug (e.g. parks-spring-notice → 2026-04-10-parks-spring-notice.md)",
          pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Use lowercase letters, numbers, and hyphens only."]
        }
      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
      - { label: "Category", name: "category", widget: "select", options: ["Press Release", "Statement", "Statement of Concern", "Community Update", "Announcement"] }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false }
      - {
          label: "Body",
          name: "body",
          widget: "markdown",
          hint: "Markdown: paragraphs, headings, lists, links. The live site reflows pasted book or web text into full-width paragraphs. The editor preview may still look choppy until save—check the published article to confirm."
        }

  - name: "calendar"
    label: "Calendar"
    folder: "content/calendar"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Slug",
          name: "slug",
          widget: "string",
          hint: "File name segment, e.g. 2026-04-13-town-meeting",
          pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Use lowercase letters, numbers, and hyphens only."]
        }
      - {
          label: "Date (MM/DD/YYYY)",
          name: "date",
          widget: "string",
          hint: "e.g. 04/13/2026",
          pattern: ['^(0[1-9]|1[0-2])\\/(0[1-9]|[12][0-9]|3[01])\\/\\d{4}$', "Use MM/DD/YYYY format."]
        }
      - { label: "Time", name: "time", widget: "string", required: false }
      - { label: "Location", name: "location", widget: "string", required: false, hint: "Venue name (shown with time on one line)" }
      - { label: "Address", name: "address", widget: "string", required: false, hint: "Street address on its own line below" }
      - {
          label: "External Link",
          name: "external_link",
          widget: "string",
          required: false,
          hint: "Optional. Include full URL starting with http:// or https://",
          pattern: ['^$|^https?:\\/\\/[^\\s]+$', "Leave blank or enter a full http(s) URL."]
        }
      - {
          label: "Summary",
          name: "summary",
          widget: "text",
          required: false,
          hint: "Multiple paragraphs: use blank lines between blocks. Line breaks are shown on the site and in preview when published styles load."
        }
