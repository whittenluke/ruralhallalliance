<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Decap CMS</title>
    <link href="/api/cms-config" type="text/yaml" rel="cms-config-url" />
    <link rel="stylesheet" href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" />
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      if (typeof CMS !== "undefined" && CMS.registerPreviewStyle) {
        CMS.registerPreviewStyle("/admin/decap-preview.css");
      }

      const editorStyle = document.createElement("style");
      editorStyle.textContent = `
        textarea {
          line-height: 1.35 !important;
        }

        /* Decap rich-text editor surface (contenteditable) */
        [contenteditable="true"][role="textbox"],
        [contenteditable="true"][data-slate-editor="true"] {
          line-height: 1.35 !important;
        }

        [contenteditable="true"][role="textbox"] p,
        [contenteditable="true"][data-slate-editor="true"] p {
          margin: 0 0 0.35rem 0 !important;
        }
      `;
      document.head.appendChild(editorStyle);

      /**
       * Normalize paste to plain text for raw markdown textareas only.
       * Do not mutate Decap rich-text DOM directly, or editor state can desync
       * (e.g., delete/backspace stops behaving correctly).
       */
      document.addEventListener(
        "paste",
        (event) => {
          const target = event.target;
          if (!(target instanceof HTMLTextAreaElement)) return;
          const text = event.clipboardData?.getData("text/plain");
          if (!text) return;

          event.preventDefault();
          const start = target.selectionStart ?? target.value.length;
          const end = target.selectionEnd ?? start;
          target.setRangeText(text, start, end, "end");
          target.dispatchEvent(new Event("input", { bubbles: true }));
        },
        true
      );
    </script>
  </body>
  </html>
